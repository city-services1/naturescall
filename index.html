<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Call - نداء الطبيعة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .phone-container { width: 360px; background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 8px solid #333; position: relative; min-height: 620px; display: flex; flex-direction: column; }
        .header { background: #2ecc71; color: white; padding: 20px; text-align: center; position: relative; }
        .lang-btn { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.3); border: none; color: white; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 12px; }
        .content { padding: 20px; flex: 1; overflow-y: auto; max-height: 450px; }
        .btn-main { display: block; width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; text-decoration: none; text-align: center; box-sizing: border-box; }
        .btn-main:active { transform: scale(0.98); }
        .btn-secondary { background: #95a5a6; }
        .toilet-card { background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); cursor: pointer; transition: 0.3s; }
        .toilet-card:hover { border-color: #2ecc71; background: #fafafa; }
        .toilet-name { font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 12px; color: white; margin-right: 5px; }
        .tag-open { background: #2ecc71; }
        .tag-closed { background: #e74c3c; }
        .tag-price { background: #e67e22; }
        .distance-text { color: #e74c3c; font-weight: bold; font-size: 13px; margin-top: 5px; display: block; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: white; width: 85%; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <button class="lang-btn" onclick="toggleLanguage()">English</button>
        <h2 id="app-title">نداء الطبيعة</h2>
        <p id="app-subtitle" style="font-size: 13px; margin: 5px 0 0 0;">دليلك للعثور على أقرب مراحيض عمومية ونظيفة</p>
    </div>

    <div class="content">
        <!-- تفعيل الـ GPS الحقيقي وترتيب القائمة -->
        <button class="btn-main" id="btn-find" onclick="getUserLocationAndSort()">🔍 تفعيل تحديد الموقع والأقرب فالأقرب</button>
        <button class="btn-main btn-secondary" id="btn-add" onclick="addNewToiletSim()">➕ إضافة مرحاض جديد</button>

        <h3 id="list-title" style="margin-top: 25px; color: #7f8c8d; font-size: 14px;">📍 المواقع المتوفرة بأكادير:</h3>
        <div id="toilets-list"></div>
    </div>

    <div class="modal" id="details-modal">
        <div class="modal-content">
            <h3 id="modal-toilet-name">اسم الموقع</h3>
            <p id="modal-toilet-details">التفاصيل هنا</p>
            <a class="btn-main" id="btn-route" target="_blank" style="background: #e74c3c;">🗺️ فتح في خرائط جوجل</a>
            <button class="btn-main btn-secondary" onclick="closeModal()">إغلاق</button>
        </div>
    </div>
</div>

<script>
    const translations = {
        ar: {
            title: "نداء الطبيعة", subtitle: "دليلك للعثور على أقرب مراحيض عمومية ونظيفة",
            find: "🔍 تفعيل تحديد الموقع والأقرب فالأقرب", add: "➕ إضافة مرحاض جديد", list: "📍 المواقع المتوفرة بأكادير (مرتبة بالأقرب):",
            free: "مجاني", open: "مفتوح الآن", closed: "مغلق حالياً", langLabel: "English",
            alert_add: "شكراً لك! تم إرسال طلب إضافة الموقع الجديد للمراجعة بنجاح.",
            close: "إغلاق", distance: "المسافة إليك: ", rating: "التقييم: ", simulate: "🗺️ فتح في خرائط جوجل",
            gps_error: "يرجى تفعيل الـ GPS في هاتفك وإعطاء الإذن للتطبيق لحساب المسافات.",
            sorting: "جاري تحديد موقعك وإعادة ترتيب المراحيض..."
        },
        en: {
            title: "Nature's Call", subtitle: "Your guide to finding nearest clean toilets",
            find: "🔍 Enable GPS & Sort by Nearest", add: "➕ Add New Toilet", list: "📍 Available Locations (Sorted by Nearest):",
            free: "Free", open: "Open Now", closed: "Closed Now", langLabel: "العربية",
            alert_add: "Thank you! New location request submitted for review successfully.",
            close: "Close", distance: "Distance to you: ", rating: "Rating: ", simulate: "🗺️ Open in Google Maps",
            gps_error: "Please enable GPS and allow location permission to calculate distances.",
            sorting: "Locating you and sorting toilets..."
        }
    };

    // مصفوفة تحتوي على 20 مرحاضاً كبداية (موزعة جغرافياً في أكادير)
    let toilets = [
        { id: 1, nameAr: "مرحاض كورنيش أكادير الرئيسي", nameEn: "Agadir Corniche Main Toilet", price: "2 MAD", isOpen: true, rating: "4.5", lat: 30.4194, lng: -9.6052, currentDistance: null },
        { id: 2, nameAr: "مرحاض قرب سوق الأحد (الباب 5)", nameEn: "Souk El Had Toilet (Gate 5)", price: "مجاني", isOpen: true, rating: "3.8", lat: 30.4115, lng: -9.5812, currentDistance: null },
        { id: 3, nameAr: "مرحاض حديقة أولهاو الشهيرة", nameEn: "Olhao Garden Public Toilet", price: "1 MAD", isOpen: false, rating: "4.2", lat: 30.4242, lng: -9.5981, currentDistance: null },
        { id: 4, nameAr: "مرحاض مارينا أكادير (قرب اليخوت)", nameEn: "Agadir Marina Luxury Toilet", price: "5 MAD", isOpen: true, rating: "4.8", lat: 30.4285, lng: -9.6145, currentDistance: null },
        { id: 5, nameAr: "مرحاض ساحة الأمل", nameEn: "Place Al Amal Public Toilet", price: "2 MAD", isOpen: true, rating: "3.5", lat: 30.4218, lng: -9.5989, currentDistance: null },
        { id: 6, nameAr: "مرحاض محطة الحافلات الباطوار", nameEn: "Battoir Bus Station Toilet", price: "1 MAD", isOpen: true, rating: "3.0", lat: 30.4068, lng: -9.5894, currentDistance: null },
        { id: 7, nameAr: "مرحاض تالبورجت (قرب المسجد)", nameEn: "Talborjt Mosque Public Toilet", price: "مجاني", isOpen: true, rating: "4.0", lat: 30.4249, lng: -9.5921, currentDistance: null },
        { id: 8, nameAr: "مرحاض فونتي (المنطقة السياحية)", width: "2 MAD", nameEn: "Founty Tourist Zone Toilet", price: "2 MAD", isOpen: true, rating: "4.1", lat: 30.3985, lng: -9.6012, currentDistance: null },
        { id: 9, nameAr: "مرحاض قرب شاطئ أنزا", nameEn: "Anza Beach Public Toilet", price: "مجاني", isOpen: true, rating: "3.6", lat: 30.4421, lng: -9.6385, currentDistance: null },
        { id: 10, nameAr: "مرحاض حي الداخلة (قرب المركب الجامعي)", nameEn: "Dakhla Neighbourhood Toilet", price: "1 MAD", isOpen: false, rating: "3.4", lat: 30.4122, lng: -9.5584, currentDistance: null },
        // يمكنك تعديل إحداثيات الـ 10 المتبقية لاحقاً بدقة تامة حسب رغبتك:
        { id: 11, nameAr: "مرحاض الهدى (قرب الملحقة الإدارية)", nameEn: "El Houda Public Toilet", price: "2 MAD", isOpen: true, rating: "3.9", lat: 30.3950, lng: -9.5520, currentDistance: null },
        { id: 12, nameAr: "مرحاض حي السلام التجاري", nameEn: "Hay Salam Commercial Toilet", price: "1 MAD", isOpen: true, rating: "3.7", lat: 30.4025, lng: -9.5630, currentDistance: null },
        { id: 13, nameAr: "مرحاض قرب حديقة ابن زيدون", nameEn: "Ibn Zaydoun Garden Toilet", price: "مجاني", isOpen: true, rating: "4.2", lat: 30.4205, lng: -9.5940, currentDistance: null },
        { id: 14, nameAr: "مرحاض صونابا (المنطقة السكنية)", nameEn: "Sonaba Residential Toilet", price: "2 MAD", isOpen: true, rating: "4.4", lat: 30.3910, lng: -9.5990, currentDistance: null },
        { id: 15, nameAr: "مرحاض الحي المحمدي الرئيسي", nameEn: "Hay Mohammadi Main Toilet", price: "2 MAD", isOpen: true, rating: "4.0", lat: 30.4350, lng: -9.5650, currentDistance: null },
        { id: 16, nameAr: "مرحاض بنسركاو (طريق إنزكان)", nameEn: "Bensergao Public Toilet", price: "1 MAD", isOpen: false, rating: "3.2", lat: 30.3850, lng: -9.5780, currentDistance: null },
        { id: 17, nameAr: "مرحاض شرف (أكادير الفوق)", nameEn: "Charaf Heights Toilet", price: "2 MAD", isOpen: true, rating: "3.9", lat: 30.4380, lng: -9.5870, currentDistance: null },
        { id: 18, nameAr: "مرحاض قرب سوق الوفاء", nameEn: "Souk El Wafa Public Toilet", price: "مجاني", isOpen: true, rating: "3.5", lat: 30.4080, lng: -9.5720, currentDistance: null },
        { id: 19, nameAr: "مرحاض حي تيكيوين الرئيسي", nameEn: "Tikiouine Centre Toilet", price: "1 MAD", isOpen: true, rating: "3.8", lat: 30.3890, lng: -9.5080, currentDistance: null },
        { id: 20, nameAr: "مرحاض محطة القطار المستقبلية / تاسيلا", nameEn: "Tassila District Toilet", price: "2 MAD", isOpen: true, rating: "3.6", lat: 30.3995, lng: -9.5245, currentDistance: null }
    ];

    let currentLang = 'ar';
    let selectedToilet = null;

    // دالة لحساب المسافة الجغرافية الحقيقية بين نقطتين (Haversine Formula)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // نصف قطر الأرض بالكيلومتر
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; 
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('app-title').innerText = t.title;
        document.getElementById('app-subtitle').innerText = t.subtitle;
        document.getElementById('btn-find').innerText = t.find;
        document.getElementById('btn-add').innerText = t.add;
        document.getElementById('list-title').innerText = t.list;
        document.querySelector('.lang-btn').innerText = t.langLabel;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

        const listDiv = document.getElementById('toilets-list');
        listDiv.innerHTML = '';

        toilets.forEach(toilet => {
            const name = currentLang === 'ar' ? toilet.nameAr : toilet.nameEn;
            const priceText = (toilet.price === 'مجاني' && currentLang === 'en') ? t.free : toilet.price;
            const statusClass = toilet.isOpen ? 'tag-open' : 'tag-closed';
            const statusText = toilet.isOpen ? t.open : t.closed;
            
            // عرض المسافة الحقيقية إذا تم حسابها عبر الـ GPS
            let distanceHTML = '';
            if (toilet.currentDistance !== null) {
                let distStr = toilet.currentDistance < 1 
                    ? `${Math.round(toilet.currentDistance * 1000)} متر` 
                    : `${toilet.currentDistance.toFixed(2)} كم`;
                if(currentLang === 'en') distStr = toilet.currentDistance < 1 ? `${Math.round(toilet.currentDistance * 1000)} meters` : `${toilet.currentDistance.toFixed(2)} km`;
                distanceHTML = `<span class="distance-text">📍 ${t.distance} ${distStr}</span>`;
            }

            listDiv.innerHTML += `
                <div class="toilet-card" onclick="openToiletDetails(${toilet.id})">
                    <div class="toilet-name">${name}</div>
                    <div style="margin-top: 8px;">
                        <span class="tag ${statusClass}">${statusText}</span>
                        <span class="tag tag-price">${priceText}</span>
                        <span style="font-size: 13px; color: #f1c40f;">⭐ ${toilet.rating}/5</span>
                        ${distanceHTML}
                    </div>
                </div>
            `;
        });
    }

    // الدالة السحرية لتفعيل الـ GPS الحقيقي وإعادة ترتيب المصفوفة
    function getUserLocationAndSort() {
        const t = translations[currentLang];
        if (!navigator.geolocation) {
            alert(t.gps_error);
            return;
        }

        document.getElementById('btn-find').innerText = t.sorting;

        navigator.geolocation.getCurrentPosition(position => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            // حساب المسافة الحقيقية لكل مرحاض بناء على موقع المستخدم الآن
            toilets.forEach(toilet => {
                toilet.currentDistance = calculateDistance(userLat, userLng, toilet.lat, toilet.lng);
            });

            // إعادة ترتيب المصفوفة برمجياً من الأقرب (المسافة الأصغر) إلى الأبعد
            toilets.sort((a, b) => a.currentDistance - b.currentDistance);

            // تحديث الواجهة فوراً بالترتيب الجديد والمدهش
            updateUI();
        }, error => {
            alert(t.gps_error);
            updateUI();
        });
    }

    function addNewToiletSim() { alert(translations[currentLang].alert_add); }

    function openToiletDetails(id) {
        selectedToilet = toilets.find(t => t.id === id);
        const name = currentLang === 'ar' ? selectedToilet.nameAr : selectedToilet.nameEn;
        const t = translations[currentLang];
        
        let distStr = "⏳ اضغط على زر تفعيل الموقع لحسابها";
        if(selectedToilet.currentDistance !== null) {
            distStr = selectedToilet.currentDistance < 1 ? `${Math.round(selectedToilet.currentDistance * 1000)} متر` : `${selectedToilet.currentDistance.toFixed(2)} كم`;
        }
        
        document.getElementById('modal-toilet-name').innerText = name;
        document.getElementById('modal-toilet-details').innerHTML = `
            <strong>${t.distance}</strong> ${distStr} <br>
            <strong>${t.rating}</strong> ⭐ ${selectedToilet.rating}/5
        `;
        document.getElementById('btn-route').innerText = t.simulate;
        document.querySelector('#details-modal button.btn-secondary').innerText = t.close;
        
        const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${selectedToilet.lat},${selectedToilet.lng}&travelmode=walking`;
        document.getElementById('btn-route').setAttribute('href', googleMapsUrl);
        
        document.getElementById('details-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('details-modal').style.display = 'none'; }
    function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateUI(); }

    updateUI();
</script>

</body>
</html>
