<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Call - نداء الطبيعة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .phone-container {
            width: 360px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 8px solid #333;
            position: relative;
            min-height: 600px;
        }
        .header {
            background: #2ecc71;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .lang-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
        .content {
            padding: 20px;
        }
        .btn-main {
            display: block;
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            text-align: center;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-secondary { background: #95a5a6; }
        
        .toilet-card {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: 0.3s;
        }
        .toilet-card:hover { border-color: #2ecc71; background: #fafafa; }
        .toilet-name { font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        
        .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 12px; color: white; margin-right: 5px; }
        .tag-open { background: #2ecc71; }
        .tag-closed { background: #e74c3c; }
        .tag-price { background: #e67e22; }

        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal-content {
            background: white;
            width: 85%;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <button class="lang-btn" onclick="toggleLanguage()">English</button>
        <h2 id="app-title">نداء الطبيعة</h2>
        <p id="app-subtitle" style="font-size: 13px; margin: 5px 0 0 0;">دليلك للعثور على أقرب مراحيض عمومية ونظيفة</p>
    </div>

    <div class="content">
        <button class="btn-main" id="btn-find" onclick="findNearestToilet()">🔍 أقرب مرحاض</button>
        <button class="btn-main btn-secondary" id="btn-add" onclick="addNewToiletSim()">➕ إضافة مرحاض جديد</button>

        <h3 id="list-title" style="margin-top: 25px; color: #7f8c8d; font-size: 14px;">📍 المواقع المتوفرة بأكادير:</h3>
        <div id="toilets-list"></div>
    </div>

    <div class="modal" id="details-modal">
        <div class="modal-content">
            <h3 id="modal-toilet-name">اسم الموقع</h3>
            <p id="modal-toilet-details">التفاصيل هنا</p>
            <a class="btn-main" id="btn-route" target="_blank" style="background: #e74c3c;">🗺️ فتح في خرائط جوجل</a>
            <button class="btn-main btn-secondary" onclick="closeModal()">إغلاق</button>
        </div>
    </div>
</div>

<script>
    const translations = {
        ar: {
            title: "نداء الطبيعة", subtitle: "دليلك للعثور على أقرب مراحيض عمومية ونظيفة",
            find: "🔍 أقرب مرحاض", add: "➕ إضافة مرحاض جديد", list: "📍 المواقع المتوفرة بأكادير:",
            free: "مجاني", open: "مفتوح الآن", closed: "مغلق حالياً", langLabel: "English",
            alert_nearest: "أقرب موقع إليك الآن هو: ", alert_add: "شكراً لك! تم إرسال طلب إضافة الموقع الجديد للمراجعة بنجاح.",
            close: "إغلاق", distance: "المسافة التقريبية: ", rating: "التقييم: ", simulate: "🗺️ فتح في خرائط جوجل"
        },
        en: {
            title: "Nature's Call", subtitle: "Your guide to finding nearest clean toilets",
            find: "🔍 Nearest Toilet", add: "➕ Add New Toilet", list: "📍 Available Locations in Agadir:",
            free: "Free", open: "Open Now", closed: "Closed Now", langLabel: "العربية",
            alert_nearest: "The nearest location to you now is: ", alert_add: "Thank you! New location request submitted for review successfully.",
            close: "Close", distance: "Approx. Distance: ", rating: "Rating: ", simulate: "🗺️ Open in Google Maps"
        }
    };

    // إضافة الإحداثيات الجغرافية الحقيقية (lat و lng) لكل موقع فـ أكادير
    const toilets = [
        { id: 1, nameAr: "مرحاض كورنيش أكادير الرئيسي", nameEn: "Agadir Corniche Main Toilet", price: "2 MAD", isOpen: true, rating: "4.5", dist: "350 متر", lat: 30.4194, lng: -9.6052 },
        { id: 2, nameAr: "مرحاض قرب سوق الأحد", nameEn: "Souk El Had Public Toilet", price: "مجاني", isOpen: true, rating: "3.8", dist: "1.2 كم", lat: 30.4115, lng: -9.5812 },
        { id: 3, nameAr: "مرحاض حديقة أولهاو", nameEn: "Olhao Garden Toilet", price: "1 MAD", isOpen: false, rating: "4.2", dist: "2.4 كم", lat: 30.4242, lng: -9.5981 }
    ];

    let currentLang = 'ar';
    let selectedToilet = null;

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('app-title').innerText = t.title;
        document.getElementById('app-subtitle').innerText = t.subtitle;
        document.getElementById('btn-find').innerText = t.find;
        document.getElementById('btn-add').innerText = t.add;
        document.getElementById('list-title').innerText = t.list;
        document.querySelector('.lang-btn').innerText = t.langLabel;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

        const listDiv = document.getElementById('toilets-list');
        listDiv.innerHTML = '';

        toilets.forEach(toilet => {
            const name = currentLang === 'ar' ? toilet.nameAr : toilet.nameEn;
            const priceText = (toilet.price === 'مجاني' && currentLang === 'en') ? t.free : toilet.price;
            const statusClass = toilet.isOpen ? 'tag-open' : 'tag-closed';
            const statusText = toilet.isOpen ? t.open : t.closed;

            listDiv.innerHTML += `
                <div class="toilet-card" onclick="openToiletDetails(${toilet.id})">
                    <div class="toilet-name">${name}</div>
                    <div style="margin-top: 8px;">
                        <span class="tag ${statusClass}">${statusText}</span>
                        <span class="tag tag-price">${priceText}</span>
                        <span style="font-size: 13px; color: #f1c40f;">⭐ ${toilet.rating}/5</span>
                    </div>
                </div>
            `;
        });
    }

    function findNearestToilet() {
        const t = translations[currentLang];
        const nearestName = currentLang === 'ar' ? toilets[0].nameAr : toilets[0].nameEn;
        alert(`${t.alert_nearest}\n📍 ${nearestName} (${toilets[0].dist})`);
    }

    function addNewToiletSim() {
        alert(translations[currentLang].alert_add);
    }

    function openToiletDetails(id) {
        selectedToilet = toilets.find(t => t.id === id);
        const name = currentLang === 'ar' ? selectedToilet.nameAr : selectedToilet.nameEn;
        const t = translations[currentLang];
        
        document.getElementById('modal-toilet-name').innerText = name;
        document.getElementById('modal-toilet-details').innerHTML = `
            <strong>${t.distance}</strong> ${selectedToilet.dist} <br>
            <strong>${t.rating}</strong> ⭐ ${selectedToilet.rating}/5
        `;
        document.getElementById('btn-route').innerText = t.simulate;
        document.querySelector('#details-modal button.btn-secondary').innerText = t.close;
        
        // هنا نقوم بتركيب رابط خرائط جوجل ديناميكياً باستخدام الإحداثيات
        const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${selectedToilet.lat},${selectedToilet.lng}&travelmode=walking`;
        document.getElementById('btn-route').setAttribute('href', googleMapsUrl);
        
        document.getElementById('details-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('details-modal').style.display = 'none';
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
